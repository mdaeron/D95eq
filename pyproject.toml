[project]
name = "D95thermo"
authors = [{name = "Mathieu Daëron", email = "mathieu@daeron.fr"}]
readme = "readme.md"
dynamic = ["version", "description"]
requires-python = ">=3.11"
license = {file = "LICENSE"}
classifiers = ["License :: OSI Approved :: MIT License"]
dependencies = [
    "D47calib>=1.3.1",
    "lmfit>=1.3.2",
    "numpy>=2.1.1",
    "ogls>=1.0",
    "uncertainties>=3.2.2",
    "correldata>=1.0.1",
]

[project.urls]
Home = "https://github.com/mdaeron/D95thermo"

[build-system]
requires = ["flit_core >=3.2,<4"]
build-backend = "flit_core.buildapi"

[tool.pixi.project]
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[tool.pixi.system-requirements]
macos = "12.7.5"
[tool.pixi.pypi-dependencies]
D95thermo = { path = ".", editable = true }

[tool.pixi.tasks]
examples = {cmd = 'python examples.py', cwd ='examples' }
coefs    = {cmd = 'python __init__.py', cwd ='src/D95thermo' }
