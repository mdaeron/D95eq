readme = "readme.md"
dynamic = ["version"]
requires-python = ">=3.11"
dependencies = [
    "D47calib>=1.3.1",
    "lmfit>=1.3.2",
    "numpy>=2.1.1",
    "ogls>=1.0",
    "uncertainties>=3.2.2",
]